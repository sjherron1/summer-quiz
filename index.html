<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Summer Brain Boost</title>

<style>
:root{--bg:#F4F4F2;--ink:#1E293B;}
*{box-sizing:border-box;}
html,body{margin:0;}
body{background:var(--bg);color:var(--ink);font-family:'Nunito',ui-rounded,'SF Pro Rounded','Segoe UI',system-ui,sans-serif;-webkit-text-size-adjust:100%;}
.display{font-family:'Fredoka',ui-rounded,'SF Pro Rounded','Segoe UI',system-ui,sans-serif;}
.wrap{max-width:640px;margin:0 auto;padding:32px 18px 56px;}
.center{text-align:center;}
.badge{display:inline-flex;align-items:center;gap:6px;background:#FEF3C7;color:#B45309;font-weight:800;font-size:13px;padding:5px 12px;border-radius:999px;margin-bottom:14px;}
.h1{font-size:34px;line-height:1.12;font-weight:700;margin:0;}
@media(min-width:520px){.h1{font-size:42px;}}
.sub{color:#64748B;font-size:16px;margin:12px 0 0;}
.seglabel{text-align:center;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#94A3B8;margin:28px 0 8px;}
.seg{display:flex;background:#E7E7E3;border-radius:16px;padding:4px;max-width:360px;margin:0 auto 28px;}
.seg button{flex:1;border:0;background:transparent;font-family:inherit;font-weight:800;font-size:14px;color:#64748B;padding:9px 0;border-radius:12px;cursor:pointer;}
.seg button.on{background:#fff;color:#1E293B;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.grid{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:520px){.grid{grid-template-columns:1fr 1fr;}}
.card{display:block;text-align:left;background:#fff;border:1px solid #ECECE8;border-radius:24px;padding:20px;cursor:pointer;font-family:inherit;transition:transform .15s;box-shadow:0 1px 3px rgba(15,23,42,.06);width:100%;}
.card:hover{transform:translateY(-2px);}
.cardtop{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.ic{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:16px;font-size:26px;}
.ic.sm{width:32px;height:32px;font-size:18px;border-radius:10px;}
.cardname{font-size:20px;font-weight:700;}
.blurb{color:#64748B;font-size:14px;}
.cardfoot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:8px;}
.start{font-weight:800;font-size:14px;}
.pill{font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;white-space:nowrap;}
.pill.muted{color:#CBD5E1;}
.reset{margin-top:24px;border:0;background:transparent;color:#94A3B8;font-weight:800;font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit;}
.qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.qhleft{display:flex;align-items:center;gap:8px;font-size:14px;}
.qhright{display:flex;align-items:center;gap:10px;}
.count{font-size:14px;font-weight:800;color:#64748B;}
.homebtn{border:0;background:transparent;color:#94A3B8;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;padding:6px 8px;border-radius:10px;}
.bar{width:100%;height:8px;background:#E7E7E3;border-radius:999px;overflow:hidden;margin-bottom:24px;}
.bar span{display:block;height:100%;border-radius:999px;transition:width .3s;}
.passage{padding:16px;border-radius:16px;font-size:14px;line-height:1.55;color:#334155;margin-bottom:16px;}
.q{font-family:'Nunito',ui-rounded,'SF Pro Rounded','Segoe UI',system-ui,sans-serif;font-size:23px;line-height:1.35;font-weight:800;color:#0F172A;margin:0 0 20px;}
.opts{display:flex;flex-direction:column;gap:12px;}
.opt{display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;background:#fff;border:1.5px solid #ECECE8;border-radius:16px;padding:15px 16px;font-family:inherit;font-weight:600;font-size:16px;color:#1E293B;cursor:pointer;}
.opt.correct{background:#ECFDF5;border-color:#10B981;color:#065F46;}
.opt.wrong{background:#FFF1F2;border-color:#F43F5E;color:#9F1239;}
.opt.dim{color:#94A3B8;}
.opt:disabled{cursor:default;}
.oi{font-size:18px;font-weight:800;}
.fb{margin-top:20px;padding:16px;border-radius:16px;background:#FFF7ED;border:1px solid #FED7AA;}
.fb.ok{background:#ECFDF5;border-color:#A7F3D0;}
.fbh{font-weight:700;font-size:17px;margin-bottom:4px;}
.fbe{font-size:14px;line-height:1.55;color:#334155;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;color:#fff;font-family:inherit;font-weight:800;font-size:16px;padding:12px 20px;border-radius:14px;cursor:pointer;margin-top:12px;}
.btn.ghost{background:#fff!important;color:#334155;border:1px solid #ECECE8;}
.results{padding-top:24px;}
.trophy{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;border-radius:999px;font-size:38px;margin-bottom:18px;}
.score{font-size:40px;font-weight:700;margin:0;}
.rmsg{font-size:18px;color:#475569;margin:8px 0 0;}
.rsub{font-size:14px;font-weight:800;color:#94A3B8;margin:4px 0 0;}
.rbtns{display:flex;flex-direction:column;gap:12px;max-width:360px;margin:28px auto 0;}
.rbtns .btn{margin-top:0;width:100%;}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important;}}
</style>
</head>

    {d:"Easier",q:"Which holiday celebrates U.S. independence?",o:["Fourth of July","Halloween","Valentine's Day","Earth Day"],c:0,e:"The Fourth of July marks independence."},
    {d:"Easier",q:"A globe is a model of:",o:["Earth","the Sun","a city","a house"],c:0,e:"A globe is a round model of Earth."},
    {d:"Easier",q:"Who leads a city's government?",o:["A mayor","A king","A general","A teacher"],c:0,e:"A mayor leads a city."},
    {d:"Easier",q:"Which continent do people in the United States live on?",o:["North America","Europe","Africa","Asia"],c:0,e:"The U.S. is in North America."},
    {d:"On-level",q:"The Great Wall is located in which country?",o:["China","India","Egypt","Mexico"],c:0,e:"The Great Wall is in China."},
    {d:"On-level",q:"Which ocean is on the East Coast of the United States?",o:["Atlantic","Pacific","Indian","Arctic"],c:0,e:"The Atlantic borders the East Coast."},
    {d:"On-level",q:"A person who studies the past is a(n):",o:["historian","biologist","artist","chef"],c:0,e:"Historians study history."},
    {d:"On-level",q:"How often are U.S. presidential elections held?",o:["Every 4 years","Every year","Every 2 years","Every 10 years"],c:0,e:"Presidents are elected every four years."},
    {d:"On-level",q:"Paris is the capital of which country?",o:["France","Italy","Spain","Germany"],c:0,e:"Paris is France's capital."},
    {d:"On-level",q:"Which ancient civilization is known for philosophers like Socrates?",o:["Greece","Egypt","China","Rome"],c:0,e:"Ancient Greece is known for its philosophers."},
    {d:"Challenge",q:"The right to a fair trial is protected by the:",o:["Bill of Rights","Declaration of Independence","Gettysburg Address","Mayflower Compact"],c:0,e:"The Bill of Rights protects many legal rights."},
    {d:"Challenge",q:"Which line divides Earth into Eastern and Western Hemispheres?",o:["Prime meridian","Equator","Tropic of Cancer","Arctic Circle"],c:0,e:"The prime meridian runs north–south at 0° longitude."},
    {d:"Challenge",q:"The Nile River flows into which sea?",o:["Mediterranean Sea","Red Sea","Black Sea","Caspian Sea"],c:0,e:"The Nile empties into the Mediterranean."},
    {d:"Challenge",q:"In the U.S., the power to declare war belongs to:",o:["Congress","the President alone","the Supreme Court","state governors"],c:0,e:"The Constitution gives Congress this power."},
    {d:"Challenge",q:"A long period of dry weather that harms crops is a:",o:["drought","flood","blizzard","tornado"],c:0,e:"A drought is an extended dry spell."},
    {d:"Challenge",q:"Which ancient wonder, still standing, was built in Egypt?",o:["The Great Pyramid","The Colossus of Rhodes","The Hanging Gardens","The Lighthouse of Alexandria"],c:0,e:"The Great Pyramid of Giza still stands today."}
   ]
  };

  // ---- safe score storage: real localStorage where allowed, else in-memory ----
  var mem = {};
  var hasLS = (function(){ try { var k="__sq"; window.localStorage.setItem(k,"1"); window.localStorage.removeItem(k); return true; } catch(e){ return false; } })();
  function getStats(){ try { if(hasLS){ var v=window.localStorage.getItem("summerquiz:stats"); return v?JSON.parse(v):{}; } return mem.s||{}; } catch(e){ return {}; } }
  function setStats(o){ try { if(hasLS){ window.localStorage.setItem("summerquiz:stats", JSON.stringify(o)); } else { mem.s=o; } } catch(e){} }

  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  function buildQuiz(id,diff){
    var pool = (BANK[id]||[]).filter(function(x){return x.d===diff;});
    var picked = shuffle(pool).slice(0,5);
    return picked.map(function(item){
      var opts = shuffle(item.o.map(function(t,idx){return {t:t,correct:idx===item.c};}));
      var ci=0; for(var k=0;k<opts.length;k++){ if(opts[k].correct){ci=k;break;} }
      return {passage:item.p||null, question:item.q, options:opts.map(function(o){return o.t;}), correctIndex:ci, explanation:item.e};
    });
  }
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  var state = {screen:"home",subject:null,difficulty:"On-level",questions:[],current:0,selected:null,locked:false,score:0,newBest:false};

  function viewHome(){
    var stats=getStats();
    var cards = SUBJECTS.map(function(s){
      var st=stats[s.id];
      var prog = (st&&st.taken>0)
        ? '<span class="pill" style="background:'+s.tint+';color:'+s.color+'">Best '+st.best+'/5 \u00B7 '+st.taken+' done</span>'
        : '<span class="pill muted">Not started</span>';
      return '<button class="card" data-subj="'+s.id+'">'
        +'<div class="cardtop"><span class="ic" style="background:'+s.tint+';color:'+s.color+'">'+s.icon+'</span>'
        +'<span class="display cardname">'+s.label+'</span></div>'
        +'<div class="blurb">'+s.blurb+'</div>'
        +'<div class="cardfoot"><span class="start" style="color:'+s.color+'">Start \u2192</span>'+prog+'</div>'
        +'</button>';
    }).join("");
    var seg = DIFF.map(function(d){ return '<button data-diff="'+d+'" class="'+(d===state.difficulty?"on":"")+'">'+d+'</button>'; }).join("");
    var any = Object.keys(stats).some(function(k){ return stats[k]&&stats[k].taken>0; });
    return '<div class="wrap">'
      +'<div class="center"><div class="badge">\u2728 Summer Brain Boost</div>'
      +'<h1 class="display h1">Pick a subject to practice</h1>'
      +'<p class="sub">Five quick questions, graded as you go. Scores save on this device.</p></div>'
      +'<div class="seglabel">Difficulty</div><div class="seg">'+seg+'</div>'
      +'<div class="grid">'+cards+'</div>'
      +(any?'<div class="center"><button class="reset" data-reset="1">Reset saved scores</button></div>':'')
      +'</div>';
  }

  function viewQuiz(){
    var q=state.questions[state.current], total=state.questions.length, s=state.subject;
    var pct = ((state.current+(state.locked?1:0))/total)*100;
    var optsHtml = q.options.map(function(opt,i){
      var cls="opt", icon="";
      if(state.locked && i===q.correctIndex){ cls+=" correct"; icon='<span class="oi" style="color:#10B981">\u2713</span>'; }
      else if(state.locked && i===state.selected && i!==q.correctIndex){ cls+=" wrong"; icon='<span class="oi" style="color:#F43F5E">\u2717</span>'; }
      else if(state.locked){ cls+=" dim"; }
      return '<button class="'+cls+'" data-opt="'+i+'"'+(state.locked?" disabled":"")+'><span>'+esc(opt)+'</span>'+icon+'</button>';
    }).join("");
    var fb="";
    if(state.locked){
      var ok = state.selected===q.correctIndex;
      fb='<div class="fb '+(ok?"ok":"no")+'">'
        +'<div class="display fbh" style="color:'+(ok?"#065F46":"#9A3412")+'">'+(ok?"Correct!":"Not quite.")+'</div>'
        +(q.explanation?'<div class="fbe">'+esc(q.explanation)+'</div>':'')
        +'<button class="btn" data-next="1" style="background:'+s.color+'">'+(state.current<total-1?"Next \u2192":"See results \u2192")+'</button></div>';
    }
    var passage = q.passage?'<div class="passage" style="background:'+s.tint+'">'+esc(q.passage)+'</div>':'';
    return '<div class="wrap">'
      +'<div class="qhead"><div class="qhleft"><span class="ic sm" style="background:'+s.tint+';color:'+s.color+'">'+s.icon+'</span><b>'+s.label+'</b></div>'
      +'<div class="qhright"><span class="count">'+(state.current+1)+' of '+total+'</span><button class="homebtn" data-home="1">\u2190 Subjects</button></div></div>'
      +'<div class="bar"><span style="width:'+pct+'%;background:'+s.color+'"></span></div>'
      +passage
      +'<h2 class="q">'+esc(q.question)+'</h2>'
      +'<div class="opts">'+optsHtml+'</div>'+fb+'</div>';
  }

  function viewResults(){
    var s=state.subject, total=state.questions.length, score=state.score, pct=total?score/total:0;
    var msg="Every round makes you sharper. Try again!";
    if(pct===1)msg="Perfect score! You crushed it. \uD83C\uDF89";
    else if(pct>=0.8)msg="Awesome work \u2014 almost flawless.";
    else if(pct>=0.6)msg="Nice \u2014 solid progress.";
    else if(pct>=0.4)msg="Good effort. A little more practice and you've got this.";
    var st=getStats()[s.id], best=(st&&st.best)||0;
    return '<div class="wrap center results">'
      +'<span class="trophy" style="background:'+s.tint+';color:'+s.color+'">\uD83C\uDFC6</span>'
      +(state.newBest?'<div class="badge">\u2728 New best!</div>':'')
      +'<h1 class="display score">'+score+' / '+total+'</h1>'
      +'<p class="rmsg">'+msg+'</p>'
      +'<p class="rsub">'+s.label+' \u00B7 best '+best+'/'+total+'</p>'
      +'<div class="rbtns"><button class="btn" data-retry="1" style="background:'+s.color+'">\u21BB New '+s.label+' quiz</button>'
      +'<button class="btn ghost" data-home="1">\u2190 Pick another subject</button></div></div>';
  }

  function render(){
    app.innerHTML = state.screen==="home"?viewHome(): state.screen==="quiz"?viewQuiz(): viewResults();
    bind();
    window.scrollTo(0,0);
  }
  function bind(){
    app.querySelectorAll("[data-diff]").forEach(function(b){ b.onclick=function(){ state.difficulty=b.getAttribute("data-diff"); render(); }; });
    app.querySelectorAll("[data-subj]").forEach(function(b){ b.onclick=function(){ start(b.getAttribute("data-subj")); }; });
    var r=app.querySelector("[data-reset]"); if(r)r.onclick=function(){ if(window.confirm && !window.confirm("Clear all saved scores?"))return; setStats({}); render(); };
    app.querySelectorAll("[data-opt]").forEach(function(b){ b.onclick=function(){ choose(parseInt(b.getAttribute("data-opt"),10)); }; });
    var nx=app.querySelector("[data-next]"); if(nx)nx.onclick=next;
    var rt=app.querySelector("[data-retry]"); if(rt)rt.onclick=function(){ start(state.subject.id); };
    app.querySelectorAll("[data-home]").forEach(function(b){ b.onclick=goHome; });
  }
  function start(id){
    var s=SUBJECTS.filter(function(x){return x.id===id;})[0];
    state.subject=s; state.questions=buildQuiz(id,state.difficulty);
    state.current=0; state.selected=null; state.locked=false; state.score=0; state.newBest=false; state.screen="quiz"; render();
  }
  function choose(i){
    if(state.locked)return;
    state.selected=i; state.locked=true;
    if(i===state.questions[state.current].correctIndex)state.score++;
    render();
  }
  function next(){
    if(state.current<state.questions.length-1){ state.current++; state.selected=null; state.locked=false; render(); }
    else {
      var st=getStats(); var prev=(st[state.subject.id]&&st[state.subject.id].best)||0;
      state.newBest=state.score>prev;
      var cur=st[state.subject.id]||{taken:0,best:0,last:0};
      st[state.subject.id]={taken:cur.taken+1,best:Math.max(cur.best,state.score),last:state.score};
      setStats(st); state.screen="results"; render();
    }
  }
  function goHome(){ state.screen="home"; state.subject=null; render(); }

  render();
})();
</script>
</body>
</html>
